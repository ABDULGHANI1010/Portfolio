<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Portfolio | ABDULGHANI1010</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030303;
  --card: rgba(22, 22, 24, 0.7);
  --border: rgba(255, 255, 255, 0.1);
  --rim-light: rgba(255, 255, 255, 0.15);
  --muted: #a1a1a6; 
  --text: #f5f5f7;
  --glass: blur(24px) saturate(160%);
  --banner-grad: linear-gradient(135deg, #444 0%, #111 100%);
  
  --badge-green: #3b9e5f;
  --badge-purple: #8b5cf6;
  --badge-blue: #2563eb;

  --rbx-keyword: #f86d7c;
  --rbx-function: #84d6f7;
  --rbx-string: #adf195;
  --rbx-comment: #666666;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ── BACKGROUND GLOW EFFECT ── */
.glow-container {
  position: fixed;
  inset: 0;
  z-index: -2;
  overflow: hidden;
  filter: blur(100px);
  opacity: 0.4;
}

.glow-blob {
  position: absolute;
  border-radius: 50%;
  animation: move 20s infinite alternate;
}

.orange { width: 400px; height: 400px; background: #ff8c00; top: -10%; left: 10%; }
.green { width: 500px; height: 500px; background: #3b9e5f; bottom: -5%; right: 5%; animation-delay: -5s; }
.purple { width: 450px; height: 450px; background: #8b5cf6; top: 40%; left: 50%; animation-delay: -10s; }

@keyframes move {
  from { transform: translate(0, 0) scale(1); }
  to { transform: translate(100px, 50px) scale(1.1); }
}

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.05) 1.5px, transparent 1.5px);
  background-size: 30px 30px;
}

/* ── ELEGANT BANNER ── */
.banner {
  width: 100%;
  height: 280px;
  position: relative;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}

.banner-image {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: 
    radial-gradient(ellipse at 20% 80%, rgba(88, 28, 135, 0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(30, 64, 175, 0.3) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg) 0%, transparent 100%);
  animation: bannerPulse 8s ease-in-out infinite;
}

@keyframes bannerPulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

.banner-image::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 40px,
    rgba(255, 255, 255, 0.01) 40px,
    rgba(255, 255, 255, 0.01) 80px
  );
}

.banner-image::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(to top, var(--bg), transparent);
}

.profile-container {
  max-width: 800px;
  margin: -75px auto 60px;
  padding: 0 24px;
  text-align: center;
  position: relative;
  z-index: 10;
}

.profile-img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  padding: 1px;
  background: var(--banner-grad);
  display: inline-block;
  /* UPDATED BOX SHADOW: Added a deep black shadow and a subtle outer glow */
  box-shadow: 0 20px 50px rgba(0,0,0,1), 0 0 20px rgba(255,255,255,0.05);
}

.profile-img img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: #111;
  display: block;
  object-fit: cover;
}

h1 { 
  font-family: 'Bebas Neue', sans-serif; 
  font-size: clamp(3.5rem, 12vw, 7.5rem); 
  margin: 20px 0 0; 
  color: transparent;
  -webkit-text-stroke: 0.5px rgba(255, 255, 255, 0.6);
  letter-spacing: 0.08em;
  font-weight: 200;
}

.profile-description {
  margin: 20px auto;
  color: var(--muted);
  line-height: 1.6;
  font-size: 1.1rem;
  max-width: 600px;
}

.skill-pills { display: flex; justify-content: center; gap: 12px; margin-top: 25px; }
.pill { 
  padding: 8px 22px; 
  border-radius: 100px; 
  font-size: 0.7rem; 
  font-weight: 800; 
  text-transform: uppercase; 
  background: transparent;
  border: 1.5px solid;
}
.pill-1 { border-color: var(--badge-green); color: var(--badge-green); }
.pill-2 { border-color: var(--badge-purple); color: var(--badge-purple); }
.pill-3 { border-color: var(--badge-blue); color: var(--badge-blue); }

section { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

/* Collapsed state - hide media, show title/desc */
.project {
  display: grid;
  grid-template-columns: 1fr;
  background: var(--card);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: 28px;
  margin-bottom: 40px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 1px 0 0 var(--rim-light), 0 40px 80px rgba(0,0,0,0.6);
  cursor: pointer;
  transition: box-shadow 0.3s ease, transform 0.3s ease;
}

.project:hover {
  transform: translateY(-2px);
  box-shadow: inset 0 1px 0 0 var(--rim-light), 0 50px 100px rgba(0,0,0,0.7);
}

.project .media {
  display: none;
}

.project .content {
  padding: 60px 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.project .content p {
  display: block;
}

.content h3 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; margin: 0 0 10px; color: #fff; }

.project .code-window {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  background: var(--card);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
}

/* Expanded state - show media and details */
.project.expanded {
  grid-template-columns: 1.15fr 0.85fr;
}

.project.expanded .media {
  display: block;
  position: relative;
  background: #000;
  z-index: 1;
  clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%);
}

.project.expanded.reverse {
  grid-template-columns: 0.85fr 1.15fr;
}

.project.expanded.reverse .media {
  grid-column: 2;
  clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
}

.project.expanded .media video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.project.expanded .content {
  padding: 60px 50px;
}

.project.expanded.reverse .content {
  grid-column: 1;
  grid-row: 1;
}

.project.expanded .code-window {
  max-height: 500px;
  opacity: 1;
}

.project-header {
  cursor: pointer;
  user-select: none;
}

.window-header {
  background: #1e1e1e;
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  border-bottom: 1px solid #2a2a2a;
}

.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot.red { background: #ff5f56; }
.dot.yellow { background: #ffbd2e; }
.dot.green { background: #27c93f; }

pre { padding: 20px; margin: 0; font-size: 0.85rem; overflow-x: auto; }
code { font-family: 'Fira Code', monospace; color: #fff; }
code .kw { color: var(--rbx-keyword); }
code .fn { color: var(--rbx-function); }
code .str { color: var(--rbx-string); }
code .cm { color: var(--rbx-comment); }

.contact-dock { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
.contact-btn {
  width: 55px; height: 55px; border-radius: 50%; background: var(--card); backdrop-filter: var(--glass);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 1px 0 0 var(--rim-light); transition: 0.3s;
}
.contact-btn:hover { transform: scale(1.1); background: #fff; }
.contact-btn:hover svg { fill: #000; }
.contact-btn:hover img { filter: brightness(0); }
.contact-btn svg { width: 24px; height: 24px; fill: #fff; }
.contact-btn img { width: 24px; height: 24px; filter: brightness(0) invert(1); }

.fade-in { opacity: 0; transform: translateY(40px); transition: 1.2s ease-out; }
.fade-in.visible { opacity: 1; transform: none; }

@media (max-width: 900px) {
  .project.expanded, .project.expanded.reverse { grid-template-columns: 1fr; }
  .project.expanded .media { clip-path: none !important; height: 250px; }
  .project.expanded.reverse .media { grid-column: 1; }
  .project.expanded.reverse .content { grid-row: auto; }
}
</style>
</head>
<body>

<div class="glow-container">
  <div class="glow-blob orange"></div>
  <div class="glow-blob green"></div>
  <div class="glow-blob purple"></div>
</div>

<div class="bg-layer"></div>

<div class="banner">
  <div class="banner-image"></div>
</div>

<div class="profile-container fade-in">
  <div class="profile-img">
    <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-11697BC1179169B8BC1C5630C029A08D-Png/150/150/AvatarHeadshot/Webp/noFilter">
  </div>
  <h1>ABDULGHANI1010</h1>
  <p class="profile-description">
    Full-stack Roblox Systems Engineer specializing in high-performance gameplay frameworks and advanced procedural animation.
  </p>
  <div class="skill-pills">
    <div class="pill pill-1">Lead Scripter</div>
    <div class="pill pill-2">Technical Artist</div>
    <div class="pill pill-3">Backend Architect</div>
  </div>
</div>

<section id="projects"></section>

<div class="contact-dock">
  <a href="#" class="contact-btn">
    <img src="images/discord.svg" alt="Discord" width="24" height="24">
  </a>
  <a href="#" class="contact-btn">
    <img src="images/roblox.svg" alt="Roblox" width="24" height="24">
  </a>
  <a href="#" class="contact-btn">
    <img src="images/instagram.svg" alt="Instagram" width="24" height="24">
  </a>
</div>

<script>
const projectData = [
  { 
    title: "Anatomical Gore v2", 
    desc: "A modular R15 system utilizing custom skinned meshes and procedural blood displacement.", 
    video: "https://www.w3schools.com/html/mov_bbb.mp4",
    code: `<span class="cm">-- Server Side Damage</span>\n<span class="kw">local</span> injury <span class="op">=</span> <span class="fn">GoreHandler.new</span>(hit)\ninjury:<span class="fn">ApplyDamage</span>(<span class="str">"Piercing"</span>)`
  },
  { 
    title: "Chess Engine Core", 
    desc: "Optimized state management with FEN notation and multiplayer sync protocols.", 
    video: "https://www.w3schools.com/html/mov_bbb.mp4",
    code: null 
  }
];

const container = document.getElementById("projects");
projectData.forEach((p, i) => {
  const isRev = i % 2 === 1;
  const project = document.createElement("div");
  project.className = `project fade-in ${isRev ? 'reverse' : ''}`;
  
  const codeHtml = p.code ? `
    <div class="code-window">
      <div class="window-header">
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
      </div>
      <pre><code>${p.code}</code></pre>
    </div>` : '';

  project.innerHTML = `
    <div class="media"><video src="${p.video}" autoplay muted loop playsinline></video></div>
    <div class="content">
        <div class="project-header">
          <h3>${p.title}</h3>
        </div>
        <p>${p.desc}</p>
        ${codeHtml}
    </div>
  `;
  container.appendChild(project);
  
  // Add click handler for expand/collapse (click anywhere on the card)
  project.addEventListener('click', () => {
    project.classList.toggle('expanded');
  });
});

const obs = new IntersectionObserver((es) => es.forEach(e => { if(e.isIntersecting) e.target.classList.add("visible"); }), {threshold:0.1});
document.querySelectorAll(".fade-in").forEach(el => obs.observe(el));
</script>
</body>
</html>
