<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Portfolio</title>

<style>
:root {
  --bg: #0b0b0c;
  --card: #121214;
  --muted: #9ca3af;
}

body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: white;
}

/* dot texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none;
}

header {
  text-align: center;
  padding: 80px 20px 30px;
}

h1 { font-size: 3rem; margin: 0; }

section { max-width: 1100px; margin: auto; padding: 40px 20px; }

.separator {
  height: 1px;
  background: linear-gradient(to right, transparent, #2a2a2a, transparent);
  margin: 50px 0;
}

/* PROFILE CENTERED */
.profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 15px;
}

.profile img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #2a2a2a;
}

.profile-info h2 {
  margin: 0;
}

.profile-info p {
  margin: 5px 0 0;
  color: var(--muted);
}

/* PROJECTS */
.project {
  display: flex;
  align-items: flex-start; /* aligns content slightly below media top */
  gap: 50px;
  margin-bottom: 100px;
  position: relative;
}

.project.reverse {
  flex-direction: row-reverse;
}

/* slash divider */
.project::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 2px;
  background: linear-gradient(to bottom, transparent, #2a2a2a, transparent);
  transform: translateX(-50%) rotate(20deg);
  opacity: 0.5;
}

.media {
  flex: 1;
}

.media video {
  width: 100%;
  border-radius: 15px;
  background: black;
}

.content {
  flex: 1;
  padding-top: 20px; /* slight offset down */
}

.content h3 {
  margin-bottom: 10px;
}

.content p {
  color: var(--muted);
}

pre {
  background: #050505;
  padding: 12px;
  border-radius: 10px;
  overflow-x: auto;
  font-size: 0.85rem;
  border: 1px solid #1f1f1f;
}

@media (max-width: 768px) {
  .project, .project.reverse {
    flex-direction: column;
  }

  .project::after { display: none; }
}
</style>
</head>

<body>

<header>
  <h1>My Roblox Portfolio</h1>
</header>

<section>
  <div class="profile">
    <img src="https://via.placeholder.com/150">
    <div class="profile-info">
      <h2>Your Name</h2>
      <p>Roblox Developer • Systems • Physics • UI</p>
    </div>
  </div>
</section>

<div class="separator"></div>

<section>
  <h2>Projects</h2>
  <div id="projects"></div>
</section>

<script>
const projectData = [
  {
    title: "Vehicle System",
    desc: "Physics-based chassis with suspension and torque.",
    video: "https://www.w3schools.com/html/mov_bbb.mp4",
    code: `local torque = power * throttle\napplyForce(torque)`
  },
  {
    title: "Chess System",
    desc: "Full movement logic and checkmate detection.",
    video: "https://www.w3schools.com/html/mov_bbb.mp4",
    code: `if isCheckmate(board) then\n  endGame()\nend`
  }
];

const container = document.getElementById("projects");

projectData.forEach((p, i) => {
  const project = document.createElement("div");
  project.className = "project" + (i % 2 === 1 ? " reverse" : "");

  project.innerHTML = `
    <div class="media">
      <video src="${p.video}" autoplay muted loop></video>
    </div>
    <div class="content">
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <pre><code>${p.code}</code></pre>
    </div>
  `;

  container.appendChild(project);
});
</script>

</body>
</html>
