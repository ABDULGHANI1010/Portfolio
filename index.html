<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  text-align: center;
  padding: 60px 20px;
}

h1 { font-size: 3rem; margin: 0; }

section { padding: 40px 20px; max-width: 1000px; margin: auto; }

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

pre {
  background: black;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 0.85rem;
}

.contact {
  text-align: center;
}

button {
  background: white;
  color: black;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>My Roblox Portfolio</h1>
  <p>Systems • Scripting • Building</p>
</header>

<section>
  <h2>About Me</h2>
  <p>I build advanced Roblox systems including physics, UI, and gameplay logic.</p>
</section>

<section>
  <h2>Projects</h2>

  <div class="projects" id="projects"></div>
</section>

<section class="contact">
  <h2>Contact</h2>
  <button>Discord: yourname</button>
</section>

<script>
// =============================
// 🔥 EDIT YOUR PROJECTS HERE
// =============================
const projectData = [
  {
    title: "Vehicle System",
    desc: "Physics-based chassis with suspension and torque.",
    img: "https://via.placeholder.com/400x200",
    code: `local torque = power * throttle\napplyForce(torque)`
  },
  {
    title: "Chess System",
    desc: "Full movement logic and checkmate detection.",
    img: "https://via.placeholder.com/400x200",
    code: `if isCheckmate(board) then\n  endGame()\nend`
  }
];

// =============================
// AUTO RENDER (no touch needed)
// =============================
const container = document.getElementById("projects");

projectData.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${p.img}">
    <div class="card-content">
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <pre><code>${p.code}</code></pre>
    </div>
  `;

  container.appendChild(card);
});
</script>

</body>
</html>
