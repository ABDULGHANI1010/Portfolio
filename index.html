<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  text-align: center;
  padding: 60px 20px;
}

h1 { font-size: 3rem; margin: 0; }

section { padding: 40px 20px; max-width: 1100px; margin: auto; }

.project {
  display: flex;
  align-items: center;
  gap: 30px;
  margin-bottom: 60px;
}

.project.reverse {
  flex-direction: row-reverse;
}

.media {
  flex: 1;
}

.media video, .media img {
  width: 100%;
  border-radius: 15px;
}

.content {
  flex: 1;
}

pre {
  background: black;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 0.85rem;
}

@media (max-width: 768px) {
  .project, .project.reverse {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  <h1>My Roblox Portfolio</h1>
  <p>Systems • Scripting • Building</p>
</header>

<section>
  <h2>Projects</h2>
  <div id="projects"></div>
</section>

<script>
// =============================
// 🔥 EDIT YOUR PROJECTS HERE
// =============================
const projectData = [
  {
    title: "Vehicle System",
    desc: "Physics-based chassis with suspension and torque.",
    video: "https://www.w3schools.com/html/mov_bbb.mp4",
    code: `local torque = power * throttle\napplyForce(torque)`
  },
  {
    title: "Chess System",
    desc: "Full movement logic and checkmate detection.",
    video: "https://www.w3schools.com/html/mov_bbb.mp4",
    code: `if isCheckmate(board) then\n  endGame()\nend`
  }
];

// =============================
// AUTO RENDER
// =============================
const container = document.getElementById("projects");

projectData.forEach((p, i) => {
  const project = document.createElement("div");
  project.className = "project" + (i % 2 === 1 ? " reverse" : "");

  project.innerHTML = `
    <div class="media">
      <video src="${p.video}" autoplay muted loop controls></video>
    </div>
    <div class="content">
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <pre><code>${p.code}</code></pre>
    </div>
  `;

  container.appendChild(project);
});
</script>

</body>
</html>
